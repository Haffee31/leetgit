<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background: white rounded square with subtle border -->
  <rect width="128" height="128" rx="22" fill="#ffffff"/>
  <rect width="128" height="128" rx="22" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <!--
    Both letters are optically aligned:
      top=32, bottom=96, height=64, stroke-weight=14

    L (orange #ffa116):
      Vertical bar  x=12, y=32, w=14, h=64  (right edge x=26)
      Horizontal foot  x=12, y=82, w=44, h=14  (right edge x=56)

    G (dark #24292f):
      Center (95, 64), radius 25, stroke-width 14
      Opening at ~1-2 o'clock (-50° from east):
        start ≈ (111, 45)  [verified: √((111-95)²+(45-64)²) ≈ 25]
        end   = (120, 64)  [rightmost: 95+25=120]
      Crossbar from rightmost (120,64) inward to center (95,64)
      Gap between letters: x=56 (L foot right) to x=63 (G left visual edge) = 7px
  -->

  <!-- L: LeetCode orange -->
  <rect x="12" y="32" width="14" height="64" rx="3" fill="#ffa116"/>
  <rect x="12" y="82" width="44" height="14" rx="3" fill="#ffa116"/>

  <!-- G: GitHub dark slate -->
  <path d="M 111 45 A 25 25 0 1 0 120 64 L 95 64"
        fill="none" stroke="#24292f" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
