<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LeetGit</title>
    <link rel="stylesheet" href="src/popup.css">
  </head>
  <body>
    <main class="popup">
      <h1 class="popup-title">LeetGit</h1>

      <div class="status-card">
        <div class="status-repo-row">
          <button id="repo-link" class="repo-name" type="button" disabled>Not configured</button>
          <div class="status-connection">
            <span id="status-dot" class="status-dot"></span>
            <span id="connection-label" class="connection-label">Checking...</span>
          </div>
        </div>
        <div class="status-divider"></div>
        <div class="status-sync-row">
          <span class="sync-label">Sync</span>
          <button id="pause-toggle" class="sync-toggle" type="button" aria-pressed="true">
            <span class="sync-toggle-thumb"></span>
          </button>
          <span id="pause-toggle-label" class="sync-toggle-state">ON</span>
        </div>
      </div>

      <div id="token-warning" class="warning" hidden></div>

      <section>
        <h2>Recent syncs</h2>
        <div id="recent-syncs" class="recent-list">
          <div class="empty">No synced submissions yet.</div>
        </div>
      </section>

      <footer class="footer">
        <button id="settings" type="button">Settings</button>
        <button id="view-repo" type="button">View Repo</button>
      </footer>
    </main>
    <script type="module" src="src/popup.js"></script>
  </body>
</html>
